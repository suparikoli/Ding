{% set no_breadcrumbs = 1 %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f2937" />
    <link rel="manifest" href="/field/manifest.json" />
    <link rel="icon" href="/field/icon-192.png" />
    <link rel="apple-touch-icon" href="/field/icon-192.png" />
    <title>Ding Field</title>
    <link rel="stylesheet" href="/field/style.css" />
    <script>
        window.DING_USER = {{ ding_user | tojson }};
        window.DING_CSRF = {{ ding_csrf | tojson }};
        window.DING_ROLES = {{ ding_roles | tojson }};
        window.DING_MAPS_PROVIDER = {{ maps_provider | tojson }};
        window.DING_MAPS_KEY = {{ maps_api_key | tojson }};
    </script>
</head>
<body>
    <div id="app">
        <header class="topbar">
            <div class="brand">
                <span class="dot"></span>
                <span class="name">Ding Field</span>
            </div>
            <nav class="tabs">
                <a href="#/agent" data-tab="agent" class="tab">My Day</a>
                <a href="#/manager" data-tab="manager" class="tab manager-only">Team</a>
                <a href="/app" class="tab">Desk</a>
            </nav>
            <div class="user">
                <span id="user-name"></span>
            </div>
        </header>

        <section id="view-agent" class="view"></section>
        <section id="view-manager" class="view"></section>
        <section id="view-offline" class="view hidden">
            <div class="offline-card">
                <h2>Offline</h2>
                <p>Showing the last cached plan. Actions queued and will sync when you reconnect.</p>
                <button id="retry">Retry</button>
            </div>
        </section>
    </div>

    <script src="/field/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/field/sw.js').catch(function(e){ console.warn('SW reg failed', e); });
            });
        }
    </script>
</body>
</html>
